<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>InfoVis Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --panel:    #161b27;
      --border:   #252d3d;
      --accent:   #4f8ef7;
      --accent2:  #f7a24f;
      --text:     #d4daf0;
      --muted:    #6b7a99;
      --selected: #f7a24f;
    }

    body {
      font-family: 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-rows: 42px 0.8fr 1.2fr;
      grid-template-columns: 1.5fr 0.8fr;
      gap: 1px;
      background-color: var(--border);
      overflow: hidden;
    }

    header {
      grid-column: 1 / -1;
      background: var(--panel);
      display: flex;
      align-items: center;
      padding: 0 1.2rem;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 400;
    }

    header .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .panel {
      background: var(--panel);
      position: relative;
      overflow: hidden;
    }

    .panel-label {
      position: absolute;
      top: 8px; left: 10px;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 10;
      pointer-events: none;
    }

    #map-panel { grid-column: 1; grid-row: 2; }

    #map-panel svg {
      width: 100%; height: 100%;
      cursor: grab;
    }
    #map-panel svg:active { cursor: grabbing; }

    .country {
  /* fill: #1e2a40;  REMOVE THIS LINE */
  stroke: #2a3a55;
  stroke-width: 0.4px;
  transition: fill 0.15s;
  vector-effect: non-scaling-stroke;
}

    .country.has-data {
      fill: #1e3a5f;
      cursor: pointer;
    }

    .country.has-data:hover { fill: #2a5080; }

    .country.selected {
      fill: var(--selected) !important;
      stroke: #fff;
      stroke-width: 1px;
    }

    #info-panel {
      grid-column: 2; grid-row: 2;
      padding: 1.8rem 1.4rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      overflow-y: auto;
    }

    .country:hover {
      stroke: #9d9b9a;
      stroke-width: 1.5px;
      cursor: pointer;
    }

    #country-name {
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--accent2);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      min-height: 2rem;
    }

    #country-name.empty { color: var(--muted); font-size: 0.85rem; }

    #indicators-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .indicator-card {
      background: #1a2133;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.55rem 0.7rem;
    }

    .indicator-card .ind-label {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .indicator-card .ind-value {
      font-size: 0.95rem;
      color: var(--accent);
    }

    .indicator-card .ind-year {
      font-size: 0.58rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    #info-hint {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: auto;
      line-height: 1.6;
    }

    #loading-indicator {
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      display: none;
    }

    #loading-indicator.active { display: block; }

    #graph-panel {
      grid-column: 1; grid-row: 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #list-panel {
      grid-column: 2; grid-row: 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #graph-panel p, #list-panel p {
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
    }

    #tooltip {
      position: fixed;
      background: #1a2133;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.4rem 0.65rem;
      font-size: 0.7rem;
      color: var(--text);
      pointer-events: none;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>InfoVis Dashboard</h1>
</header>

<!-- MAP -->
<div class="panel" id="map-panel">
  <div class="panel-label">World Map</div>
</div>

<!-- INFO -->
<div class="panel" id="info-panel">
  <div class="panel-label">Country Info</div>
  <div id="country-name" class="empty">Click a country on the map</div>
  <div id="loading-indicator">Loading indicators…</div>
  <div id="indicators-grid"></div>
  <div id="info-hint">Select a country to view World Bank indicators.</div>
</div>

<!-- GRAPH -->
<div class="panel" id="graph-panel">
  <div class="panel-label">Knowledge Graph</div>
  <p>[ graph view — coming soon ]</p>
</div>

<!-- LIST -->
<div class="panel" id="list-panel">
  <div class="panel-label">Entities List</div>
  <p>[ list view — coming soon ]</p>
</div>

<div id="tooltip"></div>

<script src="/static/main.js"></script>
</body>
</html>
